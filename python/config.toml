[train]
seed = 123
batch_size = 64
num_workers = 0 # There seems to be a bug on Mac's if num_workers > 0
valid_frac = 0.2
epochs = 5
learning_rate = 1e-4
learning_rate_min = 1e-5

[model]
backbone = "resnet18"

[dev]
mode="dev"     # dev | train
data_frac=0.20 # Fraction for subsetting
print_level=1  # Minimum print level
