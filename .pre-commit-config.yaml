repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^python/
      - id: ruff-format
        files: ^python/

  - repo: local
    hooks:
      - id: air-format
        name: air format
        entry: air format .
        language: system
        files: \.[Rr]$|\.qmd$
        pass_filenames: false